services:

  # ─── QuestDB ───────────────────────────────────────────────────────────────
  # High-performance time-series database for raw tick and order audit data.
  # Tables are auto-created on the first ILP write from the recorder.
  #
  # Interfaces:
  #   9000 — Web console (SQL queries, table browser)
  #   9009 — InfluxDB Line Protocol TCP ingestion (recorder writes here)
  #   8812 — PostgreSQL wire protocol (psql, JDBC, Grafana data source)
  questdb:
    image: questdb/questdb:8.1.0
    container_name: questdb
    ports:
      - "9000:9000"
      - "9009:9009"
      - "8812:8812"
    volumes:
      - questdb_data:/root/.questdb
    environment:
      QDB_TELEMETRY_ENABLED: "false"
    restart: unless-stopped

  # ─── Grafana ───────────────────────────────────────────────────────────────
  # Visualisation layer — connects to QuestDB via the PostgreSQL data source.
  #
  # Add data source after first login (admin / admin):
  #   PostgreSQL → host=questdb  port=8812  database=qdb  user=admin  password=quest
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - questdb
    restart: unless-stopped

volumes:
  questdb_data:
  grafana_data:
